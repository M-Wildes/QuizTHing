<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/script.js"></script>
    <title>Quizzers - Sign in</title>
</head>

<body>

<header>
    <a href="index.html"><h1>Quizzers</h1></a>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<main>
    <h2>Welcome to Quizzers!</h2>
    <p>Login or Create an Account</p>

    <section id="login">
        <h3>Login</h3>
        <form action="login" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required length="3" maxlength="18" size="25px" >
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required length="6" maxlength="64" size="25px">
            <button type="submit">Sign In</button>
            <button type="button" onclick="window.location.href='signup.html'">Create Account</button>
        </form>
    </section>
</main>

    <p>&copy; 2026 Wet Noodle Inc. All rights reserved.</p>
</footer>

</body>
</html>
